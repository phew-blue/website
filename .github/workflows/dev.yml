# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Dev

on:
  push:
    branches: [dev]

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run astro check

  build:
    name: Build & push dev
    needs: [check]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      - name: Log in to Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/phew-blue/website
          tags: |
            type=raw,value=dev
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        id: build
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=website-dev
          cache-to: type=gha,mode=max,scope=website-dev

  reconcile-dev:
    name: Reconcile dev deployment
    needs: [build]
    runs-on: ${{ vars.RUNNER || 'ubuntu-latest' }}
    steps:
      - name: Trigger deployment
        env:
          DIGEST: ${{ needs.build.outputs.digest }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          DISPATCH_URL: ${{ secrets.HOME_OPS_DISPATCH_URL }}
        run: |
          printf '{"event_type":"website-dev-deployed","client_payload":{"digest":"%s"}}' "${DIGEST}" \
            | gh api "$DISPATCH_URL" --method POST --input -
